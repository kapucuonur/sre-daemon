# SRE Daemon — Tenant Manifest
# Auto-generated by install.sh — edit as needed
# Doc: https://sre.trihonor.com/docs/manifest

tenant_id: ""          # Set your SRE Platform tenant ID for managed plan
sre_api_key: ""        # Set your SRE API key for managed plan (leave blank for self-hosted)

services:
  - name: "bikefit-api"
    runtime: "docker-compose"
    compose_file: "/home/pi/bikefit/docker-compose.yml"
    container_name: "bikefit-api"
    limits:
      cpu_threshold: 80.0
      mem_threshold: 85.0
      anomaly_sensitivity: 1.5

  - name: "bikefit-frontend"
    runtime: "docker-compose"
    compose_file: "/home/pi/bikefit/docker-compose.yml"
    container_name: "bikefit-frontend"

  - name: "trihonor-api-prod"
    runtime: "docker-compose"
    compose_file: "/home/pi/TriHonor-API/docker-compose.prod.yml"
    container_name: "trihonor-api-prod"

  - name: "coachonurai-api"
    runtime: "docker-compose"
    compose_file: "/home/pi/projects/AI-Coach/docker-compose.yml"
    container_name: "coachonurai-api"

  - name: "vaultwarden"
    runtime: "docker-compose"
    compose_file: "/home/pi/vaultwarden/docker-compose.yml"
    container_name: "vaultwarden"

  - name: "sre-daemon"
    runtime: "systemd"
    unit: "sre-daemon.service"

ollama:
  local_url: "http://localhost:11434"
  mac_url: ""            # Set MAC_IP in .env instead

notifications:
  telegram_bot_token: "" # Set TELEGRAM_BOT_TOKEN in .env instead
  telegram_chat_id: ""   # Set TELEGRAM_CHAT_ID in .env instead
  slack_bot_token: ""    # Set SLACK_BOT_TOKEN in .env instead
  slack_channel_id: ""   # Set SLACK_CHANNEL_ID in .env instead
